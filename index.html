<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hailey Sinclair | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f1ede5;
            --teal: #009688;
            --orange: #d76c3e;
            --dark: #1a1a1a;
            --white: #ffffff;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            max-width: 1100px;
            display: flex;
            justify-content: space-between;
            padding: 40px 20px;
            align-items: center;
        }

        .logo { 
            font-weight: 800; 
            font-size: 1.2rem; 
            letter-spacing: 2px; 
            text-transform: uppercase;
        }

        .logo span { 
            color: var(--teal); 
            font-weight: 400; 
        }

        /* Hero Card with Rounded Corners */
        .hero-card {
            background: var(--white);
            border: 2px solid var(--dark);
            width: 90%;
            max-width: 800px;
            margin-top: 20px;
            box-shadow: 12px 12px 0px var(--dark);
            display: flex;
            flex-direction: column;
            border-radius: 24px; /* Rounded corners */
            overflow: hidden;    /* Prevents header color from bleeding out */
        }

        .card-header {
            background: var(--teal);
            color: white;
            padding: 15px 30px;
            border-bottom: 2px solid var(--dark);
            font-weight: 700;
            letter-spacing: 1px;
        }

        .card-content {
            display: flex;
            padding: 50px;
            gap: 30px;
        }

        .bio h1 { 
            font-size: 3.2rem; 
            line-height: 0.9; 
            margin: 0 0 15px 0; 
            text-transform: uppercase; 
            font-weight: 800;
        }

        .bio p { 
            color: #555; 
            line-height: 1.6; 
            font-size: 1.1rem;
        }

        /* Grid - Forced to one line on desktop */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px;
            width: 90%;
            max-width: 800px;
            margin: 40px 0 80px 0;
        }

        /* Buttons with Rounded Corners */
        .block-btn {
            background: var(--white);
            border: 2px solid var(--dark);
            padding: 20px 10px;
            text-align: center;
            font-weight: 800;
            text-decoration: none;
            color: var(--dark);
            box-shadow: 8px 8px 0px var(--dark);
            transition: all 0.2s ease;
