<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hailey Sinclair | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f1ede5;
            --teal: #009688;
            --orange: #d76c3e;
            --dark: #1a1a1a;
            --white: #ffffff;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            width: 100%;
            max-width: 1100px;
            display: flex;
            justify-content: space-between;
            padding: 40px 20px;
            align-items: center;
        }
        .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: 2px; }
        .logo span { color: var(--teal); font-weight: 400; }

        .hero-card {
            background: var(--white);
            border: 2px solid var(--dark);
            width: 90%;
            max-width: 800px;
            margin-top: 20px;
            box-shadow: 12px 12px 0px var(--dark);
            display: flex;
            flex-direction: column;
        }
        .card-header {
            background: var(--teal);
            color: white;
            padding: 15px 30px;
            border-bottom: 2px solid var(--dark);
            font-weight: 700;
        }
        .card-content {
            display: flex;
            padding: 40px;
            gap: 30px;
        }
        .bio h1 { font-size: 3rem; line-height: 0.9; margin: 0 0 15px 0; text-transform: uppercase; }
        .bio p { color: #666; line-height: 1.6; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 800px;
            margin: 40px 0;
        }
        .block-btn {
            background: var(--white);
            border: 2px solid var(--dark);
            padding: 20px;
            text-align: center;
            font-weight: 800;
            text-decoration: none;
            color: var(--dark);
            box-shadow: 8px 8px 0px var(--dark);
            transition: 0.2s;
        }
        .block-btn:hover { transform: translate(2px, 2px); box-shadow: 4px 4px 0px var(--dark); }
        .teal-btn { background: var(--teal); color: white; }

        @media (max-width: 600px) {
            .card-content { flex-direction: column; text-align: center; }
            .bio h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">HAILEY<span>SINCLAIR</span></div>
    </header>

    <div class="hero-card">
        <div class="card-header">HELLO.</div>
        <div class="card-content">
            <div class="bio">
                <h1>Hailey<br><span style="color:var(--teal)">Sinclair</span></h1>
                <p>Mechanical Engineer | Project Lead | Design Strategist</p>
                <p>Focused on vehicle dynamics and strategic planning at a top R&D center.</p>
            </div>
        </div>
    </div>

    <div class="grid">
        <a href="#" class="block-btn teal-btn">GET IN TOUCH</a>
        <a href="#" class="block-btn">EXPERIENCE</a>
        <a href="#" class="block-btn">RESUME</a>
        <a href="#" class="block-btn">LINKEDIN</a>
    </div>

</body>
</html>
